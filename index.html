<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Комната — масштабирование (исправлено)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; width: 100%; height: 100%; }
        @media (orientation: portrait) {
            body::after {
                content: "Поверните телефон горизонтально";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.9);
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                font-family: sans-serif;
                text-align: center;
                padding: 20px;
                z-index: 999;
                backdrop-filter: blur(4px);
            }
        }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ----- РАЗМЕРЫ КОМНАТЫ -----
        const ROOM_W = 8;
        const ROOM_D = 5;
        const ROOM_H = 4;

        // ----- СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // ----- КАМЕРА (фиксированная, перспективная) -----
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 0, 8);
        camera.lookAt(0, 0, 0);

        // ----- РЕНДЕРЕР -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ----- СВЕТ (создаёт объём) -----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 6, 4);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-2, 1, 5);
        scene.add(fillLight);

        // ----- ГРУППА КОМНАТЫ (всё внутри) -----
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        // ----- ПОСТРОЕНИЕ КОМНАТЫ ВНУТРИ ГРУППЫ -----
        function buildRoom() {
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
            const ceilMat = new THREE.MeshStandardMaterial({ color: 0xccccd4, roughness: 0.9 });

            function makeWall(w, h, d, px, py, pz, mat, rotY = 0) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(px, py, pz);
                m.rotation.y = rotY;
                m.castShadow = true;
                m.receiveShadow = true;
                roomGroup.add(m);
                return m;
            }

            // Задняя стена
            makeWall(ROOM_W, ROOM_H, 0.1, 0, 0, -ROOM_D/2, wallMat);
            // Левая
            makeWall(0.1, ROOM_H, ROOM_D, -ROOM_W/2, 0, 0, wallMat);
            // Правая
            makeWall(0.1, ROOM_H, ROOM_D, ROOM_W/2, 0, 0, wallMat);
            // Пол
            const floor = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W, 0.1, ROOM_D), floorMat);
            floor.position.set(0, -ROOM_H/2, 0);
            floor.receiveShadow = true;
            floor.castShadow = false;
            roomGroup.add(floor);
            // Потолок
            const ceil = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W, 0.1, ROOM_D), ceilMat);
            ceil.position.set(0, ROOM_H/2, 0);
            ceil.castShadow = true;
            ceil.receiveShadow = true;
            roomGroup.add(ceil);

            // Окно
            function createWindow() {
                const g = new THREE.Group();
                const fm = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
                const gm = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
                const w = 2.6, h = 2.0;
                const z = -ROOM_D/2 + 0.06;
                const fg = new THREE.BoxGeometry(w, 0.06, 0.05);
                const top = new THREE.Mesh(fg, fm); top.position.set(0, 0.2, z); g.add(top);
                const bot = new THREE.Mesh(fg, fm); bot.position.set(0, -0.2 - h, z); g.add(bot);
                const lf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
                lf.position.set(-w/2, 0, z); g.add(lf);
                const rf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
                rf.position.set(w/2, 0, z); g.add(rf);
                const gl = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), gm);
                gl.position.set(0, 0, z + 0.01); g.add(gl);
                return g;
            }
            roomGroup.add(createWindow());
        }
        buildRoom();

        // ----- АДАПТАЦИЯ ПОД ЭКРАН (масштабирование группы) -----
        let baseScale = 1;
        let zoomFactor = 1;
        let offsetX = 0, offsetY = 0;
        const minZoom = 0.4;
        const maxZoom = 2.0;

        function fitRoom() {
            const aspect = window.innerWidth / window.innerHeight;
            const fovRad = THREE.MathUtils.degToRad(camera.fov);
            const visibleHeight = 2 * camera.position.z * Math.tan(fovRad / 2);
            const visibleWidth = visibleHeight * aspect;

            const scaleX = visibleWidth / ROOM_W;
            const scaleY = visibleHeight / ROOM_H;
            baseScale = Math.min(scaleX, scaleY) * 0.95; // небольшой запас

            applyTransform();
        }

        function applyTransform() {
            const totalScale = baseScale * zoomFactor;
            roomGroup.scale.set(totalScale, totalScale, totalScale);
            roomGroup.position.set(offsetX, offsetY, 0);
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            fitRoom();
        });

        // ----- УПРАВЛЕНИЕ: ПАНОРАМИРОВАНИЕ -----
        let isDragging = false;
        let prevPointer = { x: 0, y: 0 };

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            isDragging = true;
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevPointer.x;
            const dy = e.clientY - prevPointer.y;
            const speed = 0.005 / (baseScale * zoomFactor);
            offsetX += dx * speed;
            offsetY -= dy * speed;
            // Ограничения (чтобы стены не уходили за экран)
            const halfW = (ROOM_W / 2) - 0.3;
            const halfH = (ROOM_H / 2) - 0.2;
            offsetX = Math.min(halfW, Math.max(-halfW, offsetX));
            offsetY = Math.min(halfH, Math.max(-halfH, offsetY));
            applyTransform();
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });

        window.addEventListener('pointerup', () => { isDragging = false; });

        // ----- ЗУМ (изменение zoomFactor) -----
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            zoomFactor = Math.min(maxZoom, Math.max(minZoom, zoomFactor + delta));
            applyTransform();
        }, { passive: false });

        // Пинч
        let lastTouchDist = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx*dx + dy*dy);
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = (lastTouchDist - dist) * 0.005;
                zoomFactor = Math.min(maxZoom, Math.max(minZoom, zoomFactor + delta));
                lastTouchDist = dist;
                applyTransform();
            }
        }, { passive: true });

        // ----- ЗАПУСК -----
        fitRoom();
        console.log('✅ Комната с масштабированием загружена.');
    </script>
</body>
</html>
