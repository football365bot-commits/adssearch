<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Комната — работает!</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ----- РАЗМЕРЫ КОМНАТЫ -----
        const W = 8;
        const D = 5;
        const H = 4;

        // ----- СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // ----- КАМЕРА (будет обновляться) -----
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 1);
        camera.lookAt(0, 0, 0);

        // ----- РЕНДЕРЕР -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ----- СВЕТ -----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 6, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-2, 1, 5);
        scene.add(fill);

        // ----- ГРУППА КОМНАТЫ (все объекты внутри) -----
        const room = new THREE.Group();
        scene.add(room);

        // ----- ПОСТРОЕНИЕ КОМНАТЫ -----
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xccccd4, roughness: 0.9 });

        function makeWall(w, h, d, px, py, pz, mat, rotY = 0) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(px, py, pz);
            m.rotation.y = rotY;
            m.castShadow = true;
            m.receiveShadow = true;
            room.add(m);
        }

        // Задняя
        makeWall(W, H, 0.1, 0, 0, -D/2, wallMat);
        // Левая
        makeWall(0.1, H, D, -W/2, 0, 0, wallMat);
        // Правая
        makeWall(0.1, H, D, W/2, 0, 0, wallMat);

        // Пол
        const floor = new THREE.Mesh(new THREE.BoxGeometry(W, 0.1, D), floorMat);
        floor.position.set(0, -H/2, 0);
        floor.receiveShadow = true;
        floor.castShadow = false;
        room.add(floor);

        // Потолок
        const ceil = new THREE.Mesh(new THREE.BoxGeometry(W, 0.1, D), ceilMat);
        ceil.position.set(0, H/2, 0);
        ceil.castShadow = true;
        ceil.receiveShadow = true;
        room.add(ceil);

        // Окно
        function makeWindow() {
            const g = new THREE.Group();
            const fm = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
            const gm = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
            const w = 2.6, h = 2.0;
            const z = -D/2 + 0.06;
            const fg = new THREE.BoxGeometry(w, 0.06, 0.05);
            const top = new THREE.Mesh(fg, fm); top.position.set(0, 0.2, z); g.add(top);
            const bot = new THREE.Mesh(fg, fm); bot.position.set(0, -0.2 - h, z); g.add(bot);
            const lf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            lf.position.set(-w/2, 0, z); g.add(lf);
            const rf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            rf.position.set(w/2, 0, z); g.add(rf);
            const gl = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), gm);
            gl.position.set(0, 0, z + 0.01); g.add(gl);
            return g;
        }
        room.add(makeWindow());

        // ----- АДАПТАЦИЯ ПОД ЭКРАН (двигаем камеру) -----
        function fitRoom() {
            const aspect = window.innerWidth / window.innerHeight;
            // Вычисляем расстояние, на которое нужно отодвинуть камеру,
            // чтобы комната полностью влезала по ширине и высоте
            const fovRad = THREE.MathUtils.degToRad(camera.fov);
            const distFromWidth = (W / 2) / (Math.tan(fovRad / 2) * aspect);
            const distFromHeight = (H / 2) / Math.tan(fovRad / 2);
            const distance = Math.max(distFromWidth, distFromHeight) + 0.5;

            // Ставим камеру
            camera.position.set(0, 0, distance);
            camera.lookAt(0, 0, 0);
            camera.updateProjectionMatrix();

            // Меняем размер рендерера (на случай ресайза)
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ----- ЗАПУСК -----
        fitRoom();

        // ----- АДАПТАЦИЯ ПРИ ИЗМЕНЕНИИ РАЗМЕРА -----
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            fitRoom();
        });

        // ----- АНИМАЦИЯ -----
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log('✅ Комната работает!');
    </script>
</body>
</html>
