<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройка предмета</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1a1a2e; font-family: -apple-system, sans-serif; overflow: hidden; color: #fff; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        /* ---- Панель управления (справа) ---- */
        #ui-panel {
            position: fixed;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 14px 12px;
            z-index: 10;
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 150px;
            max-width: 170px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }
        #ui-panel .section-title {
            font-size: 10px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        #ui-panel .section-title:first-of-type { margin-top: 0; }
        .param-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2px;
            font-size: 12px;
            color: #aaa;
        }
        .param-row .label {
            width: 18px;
            flex-shrink: 0;
            font-weight: 400;
            color: #888;
            font-size: 11px;
        }
        .param-row .ctrl {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .param-row .ctrl button {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 15px;
            font-weight: 300;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .param-row .ctrl button:active {
            background: rgba(100, 200, 255, 0.2);
            transform: scale(0.92);
        }
        .param-row .value {
            width: 38px;
            text-align: center;
            font-size: 11px;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .param-row .ctrl .minus { color: #ff6b6b; }
        .param-row .ctrl .plus { color: #6cf; }

        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 6px;
        }
        .btn-group button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #ccc;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-group button:active { transform: scale(0.95); background: rgba(100,200,255,0.12); }
        .btn-group button.reset { background: rgba(255,70,70,0.1); border-color: rgba(255,70,70,0.15); color: #ff6b6b; }

        #status {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            font-family: sans-serif;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 4px 16px;
            border-radius: 20px;
        }

        @media (max-width: 600px) {
            #ui-panel { right: 6px; padding: 10px 8px; min-width: 120px; max-width: 140px; }
            .param-row { font-size: 10px; }
            .param-row .value { width: 30px; font-size: 10px; }
            .param-row .ctrl button { width: 20px; height: 20px; font-size: 13px; }
            .param-row .label { width: 14px; font-size: 10px; }
            #ui-panel .section-title { font-size: 9px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="status">⏳ Загрузка моделей...</div>

    <!-- Панель управления -->
    <div id="ui-panel">
        <div class="section-title">📏 Масштаб</div>
        <div class="param-row">
            <span class="label">S</span>
            <div class="ctrl">
                <button class="minus" data-param="sc" data-dir="-1">−</button>
                <span class="value" id="sc-val">1.00</span>
                <button class="plus" data-param="sc" data-dir="1">+</button>
            </div>
        </div>

        <div class="section-title">🔄 Вращение</div>
        <div class="param-row">
            <span class="label">RX</span>
            <div class="ctrl">
                <button class="minus" data-param="rx" data-dir="-1">−</button>
                <span class="value" id="rx-val">0.00</span>
                <button class="plus" data-param="rx" data-dir="1">+</button>
            </div>
        </div>
        <div class="param-row">
            <span class="label">RY</span>
            <div class="ctrl">
                <button class="minus" data-param="ry" data-dir="-1">−</button>
                <span class="value" id="ry-val">0.00</span>
                <button class="plus" data-param="ry" data-dir="1">+</button>
            </div>
        </div>
        <div class="param-row">
            <span class="label">RZ</span>
            <div class="ctrl">
                <button class="minus" data-param="rz" data-dir="-1">−</button>
                <span class="value" id="rz-val">0.00</span>
                <button class="plus" data-param="rz" data-dir="1">+</button>
            </div>
        </div>

        <div class="section-title">📍 Положение</div>
        <div class="param-row">
            <span class="label">X</span>
            <div class="ctrl">
                <button class="minus" data-param="px" data-dir="-1">−</button>
                <span class="value" id="px-val">0.000</span>
                <button class="plus" data-param="px" data-dir="1">+</button>
            </div>
        </div>
        <div class="param-row">
            <span class="label">Y</span>
            <div class="ctrl">
                <button class="minus" data-param="py" data-dir="-1">−</button>
                <span class="value" id="py-val">0.000</span>
                <button class="plus" data-param="py" data-dir="1">+</button>
            </div>
        </div>
        <div class="param-row">
            <span class="label">Z</span>
            <div class="ctrl">
                <button class="minus" data-param="pz" data-dir="-1">−</button>
                <span class="value" id="pz-val">0.000</span>
                <button class="plus" data-param="pz" data-dir="1">+</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="reset" id="reset-btn">⟲ Сбросить</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // ⚠️ ИЗМЕНИ ПУТИ К СВОИМ МОДЕЛЯМ
        // ============================================================
        const CHARACTER_PATH = 'womenmodel.glb';
        const ITEM_PATH = 'hair1.glb';

        // ============================================================
        // СЦЕНА
        // ============================================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.8, 4.5);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // ============================================================
        // УПРАВЛЕНИЕ КАМЕРОЙ
        // ============================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 1;
        controls.maxDistance = 8;
        controls.update();

        // ============================================================
        // СВЕТ
        // ============================================================
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-2, 1, 5);
        scene.add(fill);

        // ============================================================
        // ЗАГРУЗКА МОДЕЛЕЙ
        // ============================================================
        const loader = new GLTFLoader();
        let characterModel = null;
        let itemModel = null;
        let itemGroup = new THREE.Group();
        let headSlot = null;
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);

        const statusEl = document.getElementById('status');
        const uiPanel = document.getElementById('ui-panel');

        loader.load(CHARACTER_PATH, (gltf) => {
            characterModel = gltf.scene;
            characterModel.scale.set(1, 1, 1);
            characterGroup.add(characterModel);
            console.log('✅ Персонаж загружен');

            characterModel.traverse((child) => {
                if (child.isObject3D && (child.name === 'head' || child.name === 'Head' || child.name === 'head_slot')) {
                    headSlot = child;
                }
            });
            if (itemModel) attachItem();
            checkReady();
        }, undefined, (err) => {
            console.error('❌ Ошибка загрузки персонажа:', err);
            statusEl.textContent = '❌ Ошибка загрузки персонажа';
            statusEl.style.color = '#ff6b6b';
        });

        loader.load(ITEM_PATH, (gltf) => {
            itemModel = gltf.scene;
            // itemModel.scale.set(0.8, 0.8, 0.8); // подгони при необходимости
            itemGroup.add(itemModel);
            console.log('✅ Предмет загружен');
            if (characterModel) attachItem();
            checkReady();
        }, undefined, (err) => {
            console.error('❌ Ошибка загрузки предмета:', err);
            statusEl.textContent = '❌ Ошибка загрузки предмета';
            statusEl.style.color = '#ff6b6b';
        });

        function attachItem() {
            if (!characterModel || !itemModel) return;
            if (headSlot) {
                headSlot.add(itemGroup);
                console.log('✅ Предмет прикреплён к голове');
            } else {
                itemGroup.position.set(0, 1.8, 0);
                characterModel.add(itemGroup);
                console.log('⚠️ Слот головы не найден, смещение Y=1.8');
            }
            applySettings();
        }

        function checkReady() {
            if (characterModel && itemModel) {
                statusEl.textContent = '✅ Модели загружены';
                statusEl.style.color = '#6cf';
                uiPanel.style.display = 'flex';
            }
        }

        // ============================================================
        // ПАНЕЛЬ УПРАВЛЕНИЯ (кнопки + / -)
        // ============================================================
        const paramState = {
            px: 0, py: 0, pz: 0,
            rx: 0, ry: 0, rz: 0,
            sc: 1,
        };

        const steps = {
            px: 0.01, py: 0.01, pz: 0.01,
            rx: 0.05, ry: 0.05, rz: 0.05,
            sc: 0.05,
        };

        const displayEls = {
            px: document.getElementById('px-val'),
            py: document.getElementById('py-val'),
            pz: document.getElementById('pz-val'),
            rx: document.getElementById('rx-val'),
            ry: document.getElementById('ry-val'),
            rz: document.getElementById('rz-val'),
            sc: document.getElementById('sc-val'),
        };

        function updateDisplay() {
            for (const key in paramState) {
                const val = paramState[key];
                const fixed = key === 'sc' ? 2 : (key.startsWith('r') ? 2 : 3);
                displayEls[key].textContent = val.toFixed(fixed);
            }
        }

        function applySettings() {
            if (!itemGroup) return;
            itemGroup.position.set(paramState.px, paramState.py, paramState.pz);
            itemGroup.rotation.set(paramState.rx, paramState.ry, paramState.rz);
            const s = paramState.sc;
            itemGroup.scale.set(s, s, s);
        }

        function changeParam(param, delta) {
            const step = steps[param] || 0.01;
            paramState[param] += delta * step;
            // Ограничения
            if (param === 'sc') {
                paramState.sc = Math.max(0.1, Math.min(3.0, paramState.sc));
            } else if (param.startsWith('p')) {
                const limit = 1.0;
                paramState[param] = Math.max(-limit, Math.min(limit, paramState[param]));
            }
            // Вращение без ограничений
            updateDisplay();
            applySettings();
        }

        // Обработчики кнопок
        document.querySelectorAll('[data-param]').forEach(btn => {
            btn.addEventListener('click', () => {
                const param = btn.dataset.param;
                const dir = parseInt(btn.dataset.dir);
                changeParam(param, dir);
            });
        });

        // Сброс
        document.getElementById('reset-btn').addEventListener('click', () => {
            paramState.px = 0; paramState.py = 0; paramState.pz = 0;
            paramState.rx = 0; paramState.ry = 0; paramState.rz = 0;
            paramState.sc = 1;
            updateDisplay();
            applySettings();
        });

        // ============================================================
        // АДАПТАЦИЯ И АНИМАЦИЯ
        // ============================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Инициализация
        updateDisplay();

        setTimeout(() => {
            if (!characterModel || !itemModel) {
                statusEl.textContent = '⚠️ Проверь пути к моделям';
                statusEl.style.color = '#ffaa00';
            }
        }, 10000);

        console.log('🚀 Код загружен. Ожидание моделей...');
    </script>
</body>
</html>
