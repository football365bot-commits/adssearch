
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeoCollector — 3D модель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0a12; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow: hidden; }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        #canvas-container canvas { display: block; width: 100%; height: 100%; }

        #bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(12, 12, 20, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 12px;
            z-index: 10;
            touch-action: none;
        }
        .menu-btn {
            background: transparent;
            border: none;
            color: #6a6a7a;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            cursor: pointer;
            transition: color 0.15s;
            touch-action: manipulation;
            font-family: inherit;
            min-width: 48px;
        }
        .menu-btn .icon { font-size: 24px; line-height: 1.2; }
        .menu-btn.active { color: #6cf; }
        .menu-btn:active { transform: scale(0.92); }

        @media (orientation: landscape) and (min-width: 600px) {
            #bottom-menu {
                flex-direction: column;
                width: 72px;
                height: 100vh;
                top: 0;
                bottom: auto;
                left: 0;
                padding: 24px 0;
                border-top: none;
                border-right: 1px solid rgba(255, 255, 255, 0.06);
                background: rgba(12, 12, 20, 0.9);
                justify-content: center;
                gap: 16px;
            }
            #bottom-menu .menu-btn {
                flex-direction: row;
                padding: 8px 0;
                width: 100%;
                justify-content: center;
                gap: 0;
            }
            #bottom-menu .menu-btn .icon { font-size: 28px; }
            #bottom-menu .menu-btn span:last-child { display: none; }
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
        }
        .overlay.active { display: flex; }
        .panel {
            background: #1a1a2a;
            border-radius: 28px;
            padding: 28px 24px 32px;
            max-width: 420px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            color: #eee;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .panel h2 { font-weight: 500; font-size: 22px; margin-bottom: 18px; text-align: center; }
        .panel-close {
            float: right;
            background: none;
            border: none;
            color: #888;
            font-size: 26px;
            cursor: pointer;
            padding: 0 4px;
        }
        .panel-close:active { transform: scale(0.9); }

        .raid-btn {
            background: #6cf;
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 18px;
            color: #111;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .raid-btn:active { transform: scale(0.96); background: #5bf; }
        .raid-btn:disabled { opacity: 0.5; pointer-events: none; }

        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a3a;
        }
        .profile-row:last-child { border: none; }
        .profile-row span:last-child { color: #6cf; }

        #context-menu {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 30, 0.94);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px 18px;
            display: none;
            z-index: 30;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            min-width: 180px;
        }
        #context-menu .menu-item {
            color: #eee;
            font-size: 15px;
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            touch-action: manipulation;
            border: none;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-weight: 500;
        }
        #context-menu .menu-item:active { background: rgba(100, 200, 255, 0.25); transform: scale(0.95); }

        #control-panel {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 30, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 16px 20px 20px;
            display: none;
            z-index: 35;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 200px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
        }
        #control-panel .title { color: #888; font-size: 13px; margin-bottom: 2px; }
        #control-panel .arrow-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        #control-panel .arrow-btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #fff;
            font-size: 28px;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #control-panel .arrow-btn:active { background: rgba(100, 200, 255, 0.25); transform: scale(0.92); }
        #control-panel .close-btn {
            background: rgba(255, 70, 70, 0.15);
            border: none;
            color: #ff6b6b;
            font-size: 15px;
            padding: 6px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 4px;
            font-weight: 500;
        }
        #control-panel .close-btn:active { background: rgba(255, 70, 70, 0.3); }

        #toast {
            position: fixed;
            bottom: 270px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        #toast.show { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="bottom-menu">
        <button class="menu-btn active" data-tab="room"><span class="icon">🏠</span><span>Комната</span></button>
        <button class="menu-btn" data-tab="raid"><span class="icon">📍</span><span>Рейд</span></button>
        <button class="menu-btn" data-tab="inventory"><span class="icon">🎒</span><span>Инвентарь</span></button>
        <button class="menu-btn" data-tab="market"><span class="icon">🛒</span><span>Рынок</span></button>
        <button class="menu-btn" data-tab="profile"><span class="icon">👤</span><span>Профиль</span></button>
    </div>

    <div id="raid-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="raid">✕</button>
            <h2>🔍 Рейд</h2>
            <div style="text-align:center;">
                <p style="color:#aaa;" id="raid-status">Нажми кнопку, чтобы начать поиск</p>
                <button class="raid-btn" id="raid-start-btn">Начать поиск</button>
                <div id="raid-result" style="margin-top:14px;color:#6cf;font-weight:500;"></div>
            </div>
        </div>
    </div>

    <div id="inventory-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="inventory">✕</button>
            <h2>🎒 Инвентарь</h2>
            <p style="text-align:center;color:#666;">Здесь будут ваши предметы</p>
        </div>
    </div>

    <div id="market-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="market">✕</button>
            <h2>🛒 Рынок</h2>
            <p style="text-align:center;color:#666;">Здесь будет рынок</p>
        </div>
    </div>

    <div id="profile-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="profile">✕</button>
            <h2>👤 Профиль</h2>
            <div class="profile-row"><span>Имя</span><span>Игрок</span></div>
            <div class="profile-row"><span>Уровень</span><span>1</span></div>
            <div class="profile-row"><span>Рейдов пройдено</span><span>0</span></div>
            <div class="profile-row"><span>Найдено предметов</span><span>0</span></div>
            <div class="profile-row"><span>Баланс</span><span>1000</span></div>
        </div>
    </div>

    <div id="context-menu">
        <button class="menu-item" data-action="move">✋ Переместить</button>
        <button class="menu-item" data-action="rotate">🔄 Вращать</button>
        <button class="menu-item" data-action="delete">🗑️ Удалить</button>
    </div>

    <div id="control-panel">
        <div class="title" id="control-title">Перемещение</div>
        <div class="arrow-row">
            <button class="arrow-btn" data-dir="up">▲</button>
            <button class="arrow-btn" data-dir="down">▼</button>
            <button class="arrow-btn" data-dir="left">◀</button>
            <button class="arrow-btn" data-dir="right">▶</button>
        </div>
        <div class="arrow-row" style="margin-top:2px;">
            <button class="arrow-btn" data-dir="rot-left">↺</button>
            <button class="arrow-btn" data-dir="rot-right">↻</button>
        </div>
        <button class="close-btn" id="close-controls">✕ Закрыть</button>
    </div>

    <div id="toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ----- СЦЕНА -----
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x12121a);

        // ----- КАМЕРА (фиксирована, зум через FOV) -----
        const aspect = window.innerWidth / window.innerHeight;
        let baseFov = 45;
        if (aspect < 0.8) baseFov = 50;
        else if (aspect > 1.6) baseFov = 40;

        const camera = new THREE.PerspectiveCamera(baseFov, aspect, 0.1, 20);
        camera.position.set(0, 1.6, 4.8);
        camera.lookAt(0, 1.2, 0);

        // ----- РЕНДЕРЕР -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // ----- ЗУМ (FOV) -----
        let currentFov = baseFov;
        const minFov = 20;
        const maxFov = 70;

        function updateZoom() {
            camera.fov = currentFov;
            camera.updateProjectionMatrix();
        }

        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            currentFov += e.deltaY * 0.05;
            currentFov = Math.min(maxFov, Math.max(minFov, currentFov));
            updateZoom();
        }, { passive: false });

        let lastTouchDist = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx*dx + dy*dy);
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = (lastTouchDist - dist) * 0.2;
                currentFov += delta;
                currentFov = Math.min(maxFov, Math.max(minFov, currentFov));
                lastTouchDist = dist;
                updateZoom();
            }
        }, { passive: true });

        // ----- СВЕТ -----
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.6);
        mainLight.position.set(3, 5, 4);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.4);
        fill.position.set(-2, 2, 4);
        scene.add(fill);

        const point = new THREE.PointLight(0xffaa55, 0.3, 10);
        point.position.set(0, 2.5, 2);
        scene.add(point);

        // ----- КОМНАТА -----
        const roomW = 5, roomH = 3, roomD = 4;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xccccd4, roughness: 0.9 });

        function makeWall(w, h, d, px, py, pz, mat, rotY = 0) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(px, py, pz);
            m.rotation.y = rotY;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }
        makeWall(roomW, roomH, 0.1, 0, roomH/2, -roomD/2, wallMat);
        makeWall(0.1, roomH, roomD, -roomW/2, roomH/2, 0, wallMat);
        makeWall(0.1, roomH, roomD, roomW/2, roomH/2, 0, wallMat);
        const floor = makeWall(roomW, 0.1, roomD, 0, 0, 0, floorMat);
        floor.receiveShadow = true;
        floor.castShadow = false;
        makeWall(roomW, 0.1, roomD, 0, roomH, 0, ceilMat);

        // Окно
        function createWindow() {
            const g = new THREE.Group();
            const fm = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
            const gm = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
            const w = 1.8, h = 1.6;
            const z = -roomD/2 + 0.06;
            const fg = new THREE.BoxGeometry(w, 0.06, 0.05);
            const top = new THREE.Mesh(fg, fm); top.position.set(0, roomH/2 + 0.2, z); g.add(top);
            const bot = new THREE.Mesh(fg, fm); bot.position.set(0, roomH/2 - 0.2 - h, z); g.add(bot);
            const lf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            lf.position.set(-w/2, roomH/2 - 0.1, z); g.add(lf);
            const rf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            rf.position.set(w/2, roomH/2 - 0.1, z); g.add(rf);
            const gl = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), gm);
            gl.position.set(0, roomH/2 - 0.1, z + 0.01); g.add(gl);
            return g;
        }
        scene.add(createWindow());

        // ----- ПЕРСОНАЖ (ЗАГРУЗКА .GLB) -----
        const characterGroup = new THREE.Group();
        characterGroup.position.set(0, 0, 0.2);
        scene.add(characterGroup);

        // Функция загрузки модели
        function loadCharacter() {
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(
                    'model1.glb',
                    (gltf) => {
                        const model = gltf.scene;
                        model.scale.set(1.8, 1.8, 1.8);
                        model.position.set(0, 1, 0);
                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                child.userData.isCharacter = true;
                            }
                        });
                        resolve(model);
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // Загружаем модель и добавляем в сцену
        let characterLoaded = false;
        loadCharacter()
            .then(model => {
                characterGroup.add(model);
                characterLoaded = true;
                console.log('✅ Модель персонажа загружена');
            })
            .catch(err => {
                console.warn('⚠️ Ошибка загрузки модели, используем примитивы:', err);
                // Запасной вариант — примитивы
                function buildFallback() {
                    const g = new THREE.Group();
                    const skin = new THREE.MeshStandardMaterial({ color: 0xf7d6a8, roughness: 0.4 });
                    const shirt = new THREE.MeshStandardMaterial({ color: 0x4a7db5, roughness: 0.5 });
                    const pants = new THREE.MeshStandardMaterial({ color: 0x2a4a7a, roughness: 0.7 });
                    const eye = new THREE.MeshStandardMaterial({ color: 0x222222 });

                    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.4), shirt);
                    torso.position.y = 0.7; torso.castShadow = true; torso.userData.isCharacter = true;
                    g.add(torso);
                    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.15, 8), skin);
                    neck.position.y = 1.1; neck.castShadow = true; neck.userData.isCharacter = true;
                    g.add(neck);
                    const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), skin);
                    head.position.y = 1.3; head.castShadow = true; head.userData.isCharacter = true;
                    g.add(head);
                    const el = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eye);
                    el.position.set(-0.12, 1.35, 0.22); el.userData.isCharacter = true;
                    g.add(el);
                    const er = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eye);
                    er.position.set(0.12, 1.35, 0.22); er.userData.isCharacter = true;
                    g.add(er);
                    const armMat = skin;
                    const la = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5, 6), armMat);
                    la.position.set(-0.45, 0.8, 0); la.rotation.z = 0.3; la.castShadow = true; la.userData.isCharacter = true;
                    g.add(la);
                    const ra = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5, 6), armMat);
                    ra.position.set(0.45, 0.8, 0); ra.rotation.z = -0.3; ra.castShadow = true; ra.userData.isCharacter = true;
                    g.add(ra);
                    const legMat = pants;
                    const ll = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), legMat);
                    ll.position.set(-0.2, 0.25, 0); ll.castShadow = true; ll.userData.isCharacter = true;
                    g.add(ll);
                    const rl = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), legMat);
                    rl.position.set(0.2, 0.25, 0); rl.castShadow = true; rl.userData.isCharacter = true;
                    g.add(rl);
                    return g;
                }
                characterGroup.add(buildFallback());
            });

        // ----- МЕБЕЛЬ -----
        const furniture = [];

        function addFurniture(mesh) {
            scene.add(mesh);
            furniture.push(mesh);
            mesh.userData.name = mesh.userData.name || 'предмет';
            return mesh;
        }

        function createChair() {
            const g = new THREE.Group();
            const wood = new THREE.MeshStandardMaterial({ color: 0x6a4a2a, roughness: 0.8 });
            const seatMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 });
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.06, 0.5), seatMat);
            seat.position.y = 0.35; seat.castShadow = true; seat.receiveShadow = true;
            g.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.04), wood);
            back.position.set(0, 0.6, -0.25); back.castShadow = true;
            g.add(back);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
            const lp = [[-0.2,0.15,-0.2],[0.2,0.15,-0.2],[-0.2,0.15,0.2],[0.2,0.15,0.2]];
            lp.forEach(p => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.3, 6), legMat);
                leg.position.set(p[0], p[1], p[2]); leg.castShadow = true;
                g.add(leg);
            });
            g.userData.name = 'Стул';
            return g;
        }
        function createTable() {
            const g = new THREE.Group();
            const topMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 });
            const legMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.8 });
            const top = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.06, 0.6), topMat);
            top.position.y = 0.6; top.castShadow = true; top.receiveShadow = true;
            g.add(top);
            const lp = [[-0.35,0.25,-0.25],[0.35,0.25,-0.25],[-0.35,0.25,0.25],[0.35,0.25,0.25]];
            lp.forEach(p => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8), legMat);
                leg.position.set(p[0], p[1], p[2]); leg.castShadow = true;
                g.add(leg);
            });
            g.userData.name = 'Стол';
            return g;
        }
        function createTV() {
            const g = new THREE.Group();
            const screenMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.1, metalness: 0.8 });
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.5 });
            const standMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4 });
            const screen = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.04), screenMat);
            screen.position.set(0, 0.7, 0); screen.castShadow = true;
            g.add(screen);
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.55, 0.06), frameMat);
            frame.position.set(0, 0.7, 0); frame.castShadow = true;
            g.add(frame);
            const stand = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, 0.2), standMat);
            stand.position.set(0, 0.25, 0); stand.castShadow = true;
            g.add(stand);
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.25, 8), standMat);
            stem.position.set(0, 0.4, 0); stem.castShadow = true;
            g.add(stem);
            g.userData.name = 'Телевизор';
            return g;
        }

        const chair1 = createChair(); chair1.position.set(-1.0, 0, 1.2); addFurniture(chair1);
        const table1 = createTable(); table1.position.set(1.2, 0, -0.8); addFurniture(table1);
        const tv1 = createTV(); tv1.position.set(-1.5, 0, -1.5); tv1.rotation.y = 0.4; addFurniture(tv1);
        const chair2 = createChair(); chair2.position.set(1.6, 0, 1.0); chair2.rotation.y = -0.5; addFurniture(chair2);

        // ----- ВРАЩЕНИЕ ПЕРСОНАЖА (перетаскивание) -----
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let isDragging = false;
        let prevX = 0;
        let charRotY = 0;

        function isHitCharacter(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            pointer.set(x, y);
            raycaster.setFromCamera(pointer, camera);
            const meshes = [];
            characterGroup.traverse(child => { if (child.isMesh) meshes.push(child); });
            const hits = raycaster.intersectObjects(meshes, false);
            return hits.length > 0;
        }

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            if (e.target.closest('#context-menu') || e.target.closest('#control-panel') || e.target.closest('#bottom-menu')) return;
            if (isHitCharacter(e)) {
                isDragging = true;
                prevX = e.clientX;
                renderer.domElement.style.touchAction = 'none';
            } else {
                const hitItem = getIntersectedItem(e);
                if (hitItem) selectItem(hitItem);
                else selectItem(null);
            }
        }, { passive: true });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevX;
            charRotY += dx * 0.005;
            characterGroup.rotation.y = charRotY;
            prevX = e.clientX;
        }, { passive: true });

        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false;
                renderer.domElement.style.touchAction = 'auto';
            }
        }, { passive: true });

        // ----- ВЫДЕЛЕНИЕ ПРЕДМЕТОВ -----
        function getIntersectedItem(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            pointer.set(x, y);
            raycaster.setFromCamera(pointer, camera);
            const meshes = [];
            furniture.forEach(g => g.traverse(child => { if (child.isMesh) meshes.push(child); }));
            const hits = raycaster.intersectObjects(meshes, false);
            if (hits.length) {
                let parent = hits[0].object;
                while (parent.parent && !furniture.includes(parent)) parent = parent.parent;
                if (furniture.includes(parent)) return parent;
            }
            return null;
        }

        // ----- UI ЛОГИКА -----
        let selected = null;
        let mode = 'move';
        const contextMenu = document.getElementById('context-menu');
        const controlPanel = document.getElementById('control-panel');
        const controlTitle = document.getElementById('control-title');
        const toast = document.getElementById('toast');

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function selectItem(item) {
            if (selected) {
                selected.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissive && child.material.emissive.setHex(0x000000);
                        child.material.emissiveIntensity = 0;
                    }
                });
            }
            selected = item;
            if (item) {
                item.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissive = new THREE.Color(0x44aaff);
                        child.material.emissiveIntensity = 0.15;
                    }
                });
                showToast(`Выделен: ${item.userData.name}`);
                contextMenu.style.display = 'flex';
                controlPanel.style.display = 'none';
            } else {
                contextMenu.style.display = 'none';
                controlPanel.style.display = 'none';
            }
        }

        document.querySelectorAll('#context-menu .menu-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!selected) return;
                const action = btn.dataset.action;
                if (action === 'move') {
                    mode = 'move';
                    controlTitle.textContent = 'Перемещение';
                    controlPanel.style.display = 'flex';
                    contextMenu.style.display = 'none';
                    showToast('Режим: перемещение');
                } else if (action === 'rotate') {
                    mode = 'rotate';
                    controlTitle.textContent = 'Вращение';
                    controlPanel.style.display = 'flex';
                    contextMenu.style.display = 'none';
                    showToast('Режим: вращение');
                } else if (action === 'delete') {
                    scene.remove(selected);
                    const idx = furniture.indexOf(selected);
                    if (idx > -1) furniture.splice(idx, 1);
                    selectItem(null);
                    controlPanel.style.display = 'none';
                    showToast('Предмет удалён');
                }
            });
        });

        document.querySelectorAll('.arrow-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!selected) return;
                const dir = btn.dataset.dir;
                const step = 0.08;
                const rotStep = 0.15;
                if (mode === 'move') {
                    let dx = 0, dz = 0;
                    if (dir === 'up') dz = step;
                    else if (dir === 'down') dz = -step;
                    else if (dir === 'left') dx = -step;
                    else if (dir === 'right') dx = step;
                    const halfX = roomW/2 - 0.3;
                    const halfZ = roomD/2 - 0.3;
                    selected.position.x = Math.max(-halfX, Math.min(halfX, selected.position.x + dx));
                    selected.position.z = Math.max(-halfZ, Math.min(halfZ, selected.position.z + dz));
                } else if (mode === 'rotate') {
                    if (dir === 'rot-left') selected.rotation.y -= rotStep;
                    else if (dir === 'rot-right') selected.rotation.y += rotStep;
                }
            });
        });

        document.getElementById('close-controls').addEventListener('click', () => {
            controlPanel.style.display = 'none';
            selectItem(selected);
        });

        // ----- РЕЙД (эмуляция) -----
        const raidBtn = document.getElementById('raid-start-btn');
        const raidStatus = document.getElementById('raid-status');
        const raidResult = document.getElementById('raid-result');

        raidBtn.addEventListener('click', () => {
            raidBtn.disabled = true;
            raidStatus.textContent = '⏳ Поиск зоны...';
            raidResult.textContent = '';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lon = pos.coords.longitude.toFixed(6);
                        raidStatus.textContent = `📍 Ваши координаты: ${lat}, ${lon}`;
                        const zLat = lat + (Math.random() - 0.5) * 0.02;
                        const zLon = lon + (Math.random() - 0.5) * 0.02;
                        raidResult.innerHTML = `🎯 Зона: ${zLat}, ${zLon}<br>🔎 Идёт поиск...`;
                        setTimeout(() => {
                            const items = ['🧥 Куртка', '🧢 Панамка', '📺 Телевизор', '🪑 Стул', '💡 Лампа'];
                            const found = items[Math.floor(Math.random() * items.length)];
                            raidResult.innerHTML = `✅ Вы нашли: ${found}!`;
                            raidStatus.textContent = '🎉 Рейд завершён!';
                            raidBtn.disabled = false;
                        }, 2000);
                    },
                    (err) => {
                        raidStatus.textContent = '❌ Ошибка GPS: ' + err.message;
                        raidBtn.disabled = false;
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                raidStatus.textContent = '❌ Геолокация не поддерживается';
                raidBtn.disabled = false;
            }
        });

        // ----- МЕНЮ (переключение панелей) -----
        const overlays = {
            raid: document.getElementById('raid-overlay'),
            inventory: document.getElementById('inventory-overlay'),
            market: document.getElementById('market-overlay'),
            profile: document.getElementById('profile-overlay'),
        };
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (tab === 'room') {
                    Object.values(overlays).forEach(o => o.classList.remove('active'));
                } else {
                    Object.values(overlays).forEach(o => o.classList.remove('active'));
                    if (overlays[tab]) overlays[tab].classList.add('active');
                }
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        document.querySelectorAll('[data-close]').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.dataset.close;
                overlays[name].classList.remove('active');
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.menu-btn[data-tab="room"]').classList.add('active');
            });
        });

        // ----- АДАПТАЦИЯ -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ----- АНИМАЦИЯ -----
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log('GeoCollector с 3D моделью загружен.');
    </script>
</body>
</html>
