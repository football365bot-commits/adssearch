<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Комната — зум к любой точке</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ----- НАСТРОЙКИ -----
        const config = {
            roomWidth: 7,
            roomDepth: 5,
            roomHeight: 3.5,
            cameraDistance: 6.5,
            cameraY: 1.8,
            minFov: 20,
            maxFov: 60,
            startFov: 40,
        };

        // ----- СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // ----- КАМЕРА (перспективная) -----
        const camera = new THREE.PerspectiveCamera(config.startFov, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, config.cameraY, config.cameraDistance);
        camera.lookAt(0, config.cameraY, 0);

        // ----- РЕНДЕРЕР -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ----- СВЕТ -----
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-2, 2, 4);
        scene.add(fill);

        // ----- КОМНАТА -----
        const { roomWidth, roomDepth, roomHeight } = config;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xccccd4, roughness: 0.9 });

        function makeWall(w, h, d, px, py, pz, mat, rotY = 0) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(px, py, pz);
            m.rotation.y = rotY;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }
        makeWall(roomWidth, roomHeight, 0.1, 0, roomHeight/2, -roomDepth/2, wallMat);
        makeWall(0.1, roomHeight, roomDepth, -roomWidth/2, roomHeight/2, 0, wallMat);
        makeWall(0.1, roomHeight, roomDepth, roomWidth/2, roomHeight/2, 0, wallMat);
        const floor = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, 0.1, roomDepth), floorMat);
        floor.position.set(0, 0, 0);
        floor.receiveShadow = true;
        floor.castShadow = false;
        scene.add(floor);
        const ceil = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, 0.1, roomDepth), ceilMat);
        ceil.position.set(0, roomHeight, 0);
        ceil.castShadow = true;
        ceil.receiveShadow = true;
        scene.add(ceil);

        // Окно
        function createWindow() {
            const g = new THREE.Group();
            const fm = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
            const gm = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
            const w = 2.2, h = 2.0;
            const z = -roomDepth/2 + 0.06;
            const fg = new THREE.BoxGeometry(w, 0.06, 0.05);
            const top = new THREE.Mesh(fg, fm); top.position.set(0, roomHeight/2 + 0.2, z); g.add(top);
            const bot = new THREE.Mesh(fg, fm); bot.position.set(0, roomHeight/2 - 0.2 - h, z); g.add(bot);
            const lf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            lf.position.set(-w/2, roomHeight/2 - 0.1, z); g.add(lf);
            const rf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            rf.position.set(w/2, roomHeight/2 - 0.1, z); g.add(rf);
            const gl = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), gm);
            gl.position.set(0, roomHeight/2 - 0.1, z + 0.01); g.add(gl);
            return g;
        }
        scene.add(createWindow());

        // ----- УПРАВЛЕНИЕ: ПАНОРАМИРОВАНИЕ + ЗУМ (к точке) -----
        let target = new THREE.Vector3(0, config.cameraY, 0); // точка, на которую смотрим
        let currentFov = config.startFov;
        const { minFov, maxFov } = config;
        let isDragging = false;
        let prevPointer = { x: 0, y: 0 };
        const panSpeed = 0.02;

        function updateCamera() {
            camera.position.set(target.x, target.y + config.cameraY, target.z + config.cameraDistance);
            camera.lookAt(target.x, target.y, target.z);
            camera.fov = currentFov;
            camera.updateProjectionMatrix();
        }

        // Панорамирование (перемещение камеры) — клик и перетаскивание
        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            isDragging = true;
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });
        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevPointer.x;
            const dy = e.clientY - prevPointer.y;
            // Смещение зависит от текущего FOV (чем ближе, тем меньше шаг)
            const factor = 0.02 * (currentFov / 40);
            target.x -= dx * factor;
            target.y += dy * factor;
            // Ограничиваем, чтобы не выйти за стены
            const halfW = (roomWidth / 2) - 0.5;
            const halfH = (roomHeight / 2) - 0.3;
            target.x = Math.min(halfW, Math.max(-halfW, target.x));
            target.y = Math.min(halfH, Math.max(-halfH, target.y));
            updateCamera();
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });
        window.addEventListener('pointerup', () => { isDragging = false; });

        // Зум (FOV) — приближает/отдаляет текущую точку
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            currentFov += e.deltaY * 0.05;
            currentFov = Math.min(maxFov, Math.max(minFov, currentFov));
            updateCamera();
        }, { passive: false });

        // Пинч для мобильных
        let lastTouchDist = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx*dx + dy*dy);
            }
        }, { passive: true });
        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = (lastTouchDist - dist) * 0.2;
                currentFov += delta;
                currentFov = Math.min(maxFov, Math.max(minFov, currentFov));
                lastTouchDist = dist;
                updateCamera();
            }
        }, { passive: true });

        // Также можно добавить тап по предмету, чтобы приблизить его
        // (это уже отдельная механика, но для прототипа оставляем так)

        // ----- АДАПТАЦИЯ ПРИ ИЗМЕНЕНИИ РАЗМЕРА ЭКРАНА -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ----- АНИМАЦИЯ -----
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log('✅ Комната с зумом к любой точке. Перетаскивай, чтобы перемещать камеру.');
    </script> 
</body>
</html>
