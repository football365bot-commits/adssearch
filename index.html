<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Комната</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ----- РАЗМЕРЫ КОМНАТЫ (фиксированные) -----
        const W = 8;   // ширина
        const D = 5;   // глубина
        const H = 4;   // высота
        const CAM_Y = 2; // высота камеры от пола

        // ----- СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // ----- КАМЕРА (будет пересчитываться) -----
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        let distance = 0;
        let panX = 0, panY = 0;
        let zoom = 1; // множитель зума
        const minZoom = 0.6;
        const maxZoom = 2.5;

        function updateCamera() {
            const dist = distance / zoom;
            camera.position.set(panX, CAM_Y + panY, dist);
            camera.lookAt(panX, CAM_Y + panY, 0);
            camera.updateProjectionMatrix();
        }

        function fitRoom() {
            const aspect = window.innerWidth / window.innerHeight;
            const fovRad = THREE.MathUtils.degToRad(camera.fov);
            const tanHalf = Math.tan(fovRad / 2);
            const distW = (W / 2) / (tanHalf * aspect);
            const distH = (H / 2) / tanHalf;
            distance = Math.max(distW, distH) + 0.2;
            // Ограничиваем панорамирование
            const halfW = (W / 2) - (distance / zoom) * tanHalf * aspect;
            const halfH = (H / 2) - (distance / zoom) * tanHalf;
            // (Ограничения будут применены в clampPan)
            clampPan();
            updateCamera();
        }

        function clampPan() {
            const aspect = window.innerWidth / window.innerHeight;
            const fovRad = THREE.MathUtils.degToRad(camera.fov);
            const tanHalf = Math.tan(fovRad / 2);
            const halfW = (W / 2) - (distance / zoom) * tanHalf * aspect;
            const halfH = (H / 2) - (distance / zoom) * tanHalf;
            panX = Math.min(halfW, Math.max(-halfW, panX));
            panY = Math.min(halfH, Math.max(-halfH, panY));
        }

        // ----- РЕНДЕРЕР -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ----- СВЕТ -----
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 6, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-2, 1, 5);
        scene.add(fill);

        // ----- ПОСТРОЕНИЕ КОМНАТЫ -----
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xccccd4, roughness: 0.9 });

        function makeWall(w, h, d, px, py, pz, mat, rotY = 0) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(px, py, pz);
            m.rotation.y = rotY;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }

        // Задняя
        makeWall(W, H, 0.1, 0, H/2, -D/2, wallMat);
        // Левая
        makeWall(0.1, H, D, -W/2, H/2, 0, wallMat);
        // Правая
        makeWall(0.1, H, D, W/2, H/2, 0, wallMat);

        // Пол
        const floor = new THREE.Mesh(new THREE.BoxGeometry(W, 0.1, D), floorMat);
        floor.position.set(0, 0, 0);
        floor.receiveShadow = true;
        floor.castShadow = false;
        scene.add(floor);

        // Потолок
        const ceil = new THREE.Mesh(new THREE.BoxGeometry(W, 0.1, D), ceilMat);
        ceil.position.set(0, H, 0);
        ceil.castShadow = true;
        ceil.receiveShadow = true;
        scene.add(ceil);

        // Окно (декоративное)
        function createWindow() {
            const g = new THREE.Group();
            const fm = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
            const gm = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
            const w = 2.6, h = 2.0;
            const z = -D/2 + 0.06;
            const fg = new THREE.BoxGeometry(w, 0.06, 0.05);
            const top = new THREE.Mesh(fg, fm); top.position.set(0, H/2 + 0.2, z); g.add(top);
            const bot = new THREE.Mesh(fg, fm); bot.position.set(0, H/2 - 0.2 - h, z); g.add(bot);
            const lf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            lf.position.set(-w/2, H/2 - 0.1, z); g.add(lf);
            const rf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            rf.position.set(w/2, H/2 - 0.1, z); g.add(rf);
            const gl = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), gm);
            gl.position.set(0, H/2 - 0.1, z + 0.01); g.add(gl);
            return g;
        }
        scene.add(createWindow());

        // ----- УПРАВЛЕНИЕ -----
        let isDragging = false;
        let prevPointer = { x: 0, y: 0 };

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            isDragging = true;
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevPointer.x;
            const dy = e.clientY - prevPointer.y;
            const speed = 0.015 / zoom;
            panX += dx * speed;
            panY -= dy * speed;
            clampPan();
            updateCamera();
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });

        window.addEventListener('pointerup', () => { isDragging = false; });

        // Зум (колесико)
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            zoom = Math.min(maxZoom, Math.max(minZoom, zoom + delta));
            clampPan();
            updateCamera();
        }, { passive: false });

        // Пинч
        let lastDist = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastDist = Math.sqrt(dx*dx + dy*dy);
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = (lastDist - dist) * 0.005;
                zoom = Math.min(maxZoom, Math.max(minZoom, zoom + delta));
                clampPan();
                lastDist = dist;
                updateCamera();
            }
        }, { passive: true });

        // ----- АДАПТАЦИЯ К РАЗМЕРУ ЭКРАНА -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            fitRoom();
            renderer.setSize(w, h);
        });

        // ----- ЗАПУСК -----
        fitRoom();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log('✅ Комната загружена. Перетаскивай для панорамирования, колесико для зума.');
    </script>
</body>
</html>
