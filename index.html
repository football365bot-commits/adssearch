<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Комната — только зум</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // --- КАМЕРА (перспективная, фиксированная, без панорамирования) ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20);
        // Стоим на месте, смотрим в центр комнаты
        camera.position.set(0, 1.5, 5.5);
        camera.lookAt(0, 1.5, 0);

        // --- РЕНДЕРЕР ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- СВЕТ ---
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-2, 2, 4);
        scene.add(fill);

        // --- КОМНАТА (размеры, чтобы заполнять экран) ---
        const roomW = 5;
        const roomD = 4;
        const roomH = 3;

        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xccccd4, roughness: 0.9 });

        function makeWall(w, h, d, px, py, pz, mat, rotY = 0) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(px, py, pz);
            m.rotation.y = rotY;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }

        // Задняя, левая, правая стены
        makeWall(roomW, roomH, 0.1, 0, roomH/2, -roomD/2, wallMat);
        makeWall(0.1, roomH, roomD, -roomW/2, roomH/2, 0, wallMat);
        makeWall(0.1, roomH, roomD, roomW/2, roomH/2, 0, wallMat);

        // Пол
        const floor = new THREE.Mesh(new THREE.BoxGeometry(roomW, 0.1, roomD), floorMat);
        floor.position.set(0, 0, 0);
        floor.receiveShadow = true;
        floor.castShadow = false;
        scene.add(floor);

        // Потолок
        const ceil = new THREE.Mesh(new THREE.BoxGeometry(roomW, 0.1, roomD), ceilMat);
        ceil.position.set(0, roomH, 0);
        ceil.castShadow = true;
        ceil.receiveShadow = true;
        scene.add(ceil);

        // Окно (на задней стене)
        function createWindow() {
            const g = new THREE.Group();
            const fm = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
            const gm = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
            const w = 1.8, h = 1.6;
            const z = -roomD/2 + 0.06;
            const fg = new THREE.BoxGeometry(w, 0.06, 0.05);
            const top = new THREE.Mesh(fg, fm); top.position.set(0, roomH/2 + 0.2, z); g.add(top);
            const bot = new THREE.Mesh(fg, fm); bot.position.set(0, roomH/2 - 0.2 - h, z); g.add(bot);
            const lf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            lf.position.set(-w/2, roomH/2 - 0.1, z); g.add(lf);
            const rf = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), fm);
            rf.position.set(w/2, roomH/2 - 0.1, z); g.add(rf);
            const gl = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), gm);
            gl.position.set(0, roomH/2 - 0.1, z + 0.01); g.add(gl);
            return g;
        }
        scene.add(createWindow());

        // ---- УПРАВЛЕНИЕ: ТОЛЬКО ЗУМ (без панорамирования) ----
        let currentFov = 45;
        const minFov = 20;
        const maxFov = 70;

        function updateZoom() {
            camera.fov = currentFov;
            camera.updateProjectionMatrix();
        }

        // Колесико мыши
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            currentFov += e.deltaY * 0.05;
            currentFov = Math.min(maxFov, Math.max(minFov, currentFov));
            updateZoom();
        }, { passive: false });

        // Пинч для мобильных
        let lastTouchDist = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx*dx + dy*dy);
            }
        }, { passive: true });
        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = (lastTouchDist - dist) * 0.2;
                currentFov += delta;
                currentFov = Math.min(maxFov, Math.max(minFov, currentFov));
                lastTouchDist = dist;
                updateZoom();
            }
        }, { passive: true });

        // --- АДАПТАЦИЯ ПРИ ИЗМЕНЕНИИ РАЗМЕРА ЭКРАНА ---
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // --- АНИМАЦИЯ ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log('✅ Комната загружена. Только зум, без панорамирования.');
    </script>
</body>
</html>
