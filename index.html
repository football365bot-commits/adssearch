<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeoCollector — финальный билд</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #111; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #canvas-container canvas { display: block; width: 100%; height: 100%; }

        /* Меню */
        #bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20,20,30,0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 14px;
            z-index: 10;
            touch-action: none;
        }
        @media (orientation: landscape) {
            #bottom-menu {
                flex-direction: column;
                width: 70px;
                height: 100vh;
                top: 0;
                bottom: auto;
                left: 0;
                padding: 30px 0;
                border-top: none;
                border-right: 1px solid rgba(255,255,255,0.15);
                justify-content: center;
                gap: 20px;
                background: rgba(20,20,30,0.92);
            }
            #bottom-menu .menu-btn {
                flex-direction: row;
                padding: 10px 0;
                width: 100%;
                justify-content: center;
            }
            #bottom-menu .menu-btn .icon { font-size: 30px; }
            #bottom-menu .menu-btn span:last-child { display: none; }
        }
        .menu-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            cursor: pointer;
            transition: color 0.2s;
            touch-action: manipulation;
            font-family: inherit;
        }
        .menu-btn .icon { font-size: 24px; }
        .menu-btn.active { color: #6cf; }

        /* Панели */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 20;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
        }
        .overlay.active { display: flex; }
        .panel {
            background: #1e1e2a;
            border-radius: 24px;
            padding: 24px 20px 30px;
            max-width: 400px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            color: #eee;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .panel h2 { font-weight: 500; font-size: 22px; margin-bottom: 16px; text-align: center; }
        .panel-close { float: right; background: none; border: none; color: #aaa; font-size: 26px; cursor: pointer; }

        .raid-btn {
            background: #6cf;
            border: none;
            border-radius: 40px;
            padding: 14px 30px;
            font-weight: 600;
            font-size: 18px;
            color: #111;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .raid-btn:active { transform: scale(0.96); background: #5bf; }
        .raid-btn:disabled { opacity: 0.5; pointer-events: none; }

        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3a;
        }
        .profile-row:last-child { border: none; }

        /* Контекстное меню */
        #context-menu {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 12px 20px;
            display: none;
            z-index: 30;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            min-width: 200px;
        }
        #context-menu .menu-item {
            color: #eee;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            touch-action: manipulation;
            border: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        #context-menu .menu-item:active { background: rgba(100,200,255,0.3); transform: scale(0.95); }

        /* Панель управления предметами */
        #control-panel {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 16px 20px;
            display: none;
            z-index: 35;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }
        #control-panel .title {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 4px;
        }
        #control-panel .arrow-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        #control-panel .arrow-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 28px;
            width: 60px;
            height: 60px;
            border-radius: 16px;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #control-panel .arrow-btn:active { background: rgba(100,200,255,0.3); transform: scale(0.92); }
        #control-panel .close-btn {
            background: rgba(255,70,70,0.2);
            border: none;
            color: #ff6b6b;
            font-size: 16px;
            padding: 6px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 4px;
        }
        #control-panel .close-btn:active { background: rgba(255,70,70,0.4); }

        #toast {
            position: fixed;
            bottom: 280px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #toast.show { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Меню -->
    <div id="bottom-menu">
        <button class="menu-btn active" data-tab="room"><span class="icon">🏠</span><span>Комната</span></button>
        <button class="menu-btn" data-tab="raid"><span class="icon">📍</span><span>Рейд</span></button>
        <button class="menu-btn" data-tab="inventory"><span class="icon">🎒</span><span>Инвентарь</span></button>
        <button class="menu-btn" data-tab="market"><span class="icon">🛒</span><span>Рынок</span></button>
        <button class="menu-btn" data-tab="profile"><span class="icon">👤</span><span>Профиль</span></button>
    </div>

    <!-- Панели -->
    <div id="raid-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="raid">✕</button>
            <h2>🔍 Рейд</h2>
            <div style="text-align:center;">
                <p style="color:#aaa;" id="raid-status">Нажми кнопку, чтобы начать поиск</p>
                <button class="raid-btn" id="raid-start-btn">Начать поиск</button>
                <div id="raid-result" style="margin-top:12px;color:#6cf;"></div>
            </div>
        </div>
    </div>

    <div id="inventory-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="inventory">✕</button>
            <h2>🎒 Инвентарь</h2>
            <p style="text-align:center;color:#888;">Здесь будут ваши предметы</p>
        </div>
    </div>

    <div id="market-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="market">✕</button>
            <h2>🛒 Рынок</h2>
            <p style="text-align:center;color:#888;">Здесь будет рынок</p>
        </div>
    </div>

    <div id="profile-overlay" class="overlay">
        <div class="panel">
            <button class="panel-close" data-close="profile">✕</button>
            <h2>👤 Профиль</h2>
            <div class="profile-row"><span>Имя</span><span>Игрок</span></div>
            <div class="profile-row"><span>Уровень</span><span>1</span></div>
            <div class="profile-row"><span>Рейдов пройдено</span><span>0</span></div>
            <div class="profile-row"><span>Найдено предметов</span><span>0</span></div>
            <div class="profile-row"><span>Баланс</span><span>1000</span></div>
        </div>
    </div>

    <!-- Контекстное меню -->
    <div id="context-menu">
        <button class="menu-item" data-action="move">✋ Переместить</button>
        <button class="menu-item" data-action="rotate">🔄 Вращать</button>
        <button class="menu-item" data-action="delete">🗑️ Удалить</button>
    </div>

    <!-- Панель управления -->
    <div id="control-panel">
        <div class="title" id="control-title">Перемещение</div>
        <div class="arrow-row">
            <button class="arrow-btn" data-dir="up">▲</button>
            <button class="arrow-btn" data-dir="down">▼</button>
            <button class="arrow-btn" data-dir="left">◀</button>
            <button class="arrow-btn" data-dir="right">▶</button>
        </div>
        <div class="arrow-row" style="margin-top:4px;">
            <button class="arrow-btn" data-dir="rot-left">↺</button>
            <button class="arrow-btn" data-dir="rot-right">↻</button>
        </div>
        <button class="close-btn" id="close-controls">✕ Закрыть</button>
    </div>

    <div id="toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Сцена, камера, рендерер ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        // Камера фиксирована (вид на комнату с уровня глаз)
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.6, 4.5);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Свет ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.6);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
        fillLight.position.set(-2, 2, 4);
        scene.add(fillLight);

        const pointLight = new THREE.PointLight(0xffaa55, 0.3, 10);
        pointLight.position.set(0, 2.5, 2);
        scene.add(pointLight);

        // --- Комната (фиксированная) ---
        const roomWidth = 5;
        const roomHeight = 3;
        const roomDepth = 4;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.6 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9ba8, roughness: 0.8 });
        const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9 });

        function createWall(w, h, d, px, py, pz, mat, rot = 0) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(px, py, pz);
            mesh.rotation.y = rot;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }
        createWall(roomWidth, roomHeight, 0.1, 0, roomHeight/2, -roomDepth/2, wallMat);
        createWall(0.1, roomHeight, roomDepth, -roomWidth/2, roomHeight/2, 0, wallMat);
        createWall(0.1, roomHeight, roomDepth, roomWidth/2, roomHeight/2, 0, wallMat);
        const floor = createWall(roomWidth, 0.1, roomDepth, 0, 0, 0, floorMat);
        floor.receiveShadow = true;
        floor.castShadow = false;
        createWall(roomWidth, 0.1, roomDepth, 0, roomHeight, 0, ceilingMat);

        // Окно
        function createWindow() {
            const group = new THREE.Group();
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.7 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.2 });
            const w = 1.8, h = 1.6;
            const zPos = -roomDepth/2 + 0.06;
            const frameGeom = new THREE.BoxGeometry(w, 0.06, 0.05);
            const top = new THREE.Mesh(frameGeom, frameMat);
            top.position.set(0, roomHeight/2 + 0.2, zPos);
            group.add(top);
            const bottom = new THREE.Mesh(frameGeom, frameMat);
            bottom.position.set(0, roomHeight/2 - 0.2 - h, zPos);
            group.add(bottom);
            const left = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), frameMat);
            left.position.set(-w/2, roomHeight/2 - 0.1, zPos);
            group.add(left);
            const right = new THREE.Mesh(new THREE.BoxGeometry(0.06, h, 0.05), frameMat);
            right.position.set(w/2, roomHeight/2 - 0.1, zPos);
            group.add(right);
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(w - 0.15, h - 0.15), glassMat);
            glass.position.set(0, roomHeight/2 - 0.1, zPos + 0.01);
            group.add(glass);
            return group;
        }
        scene.add(createWindow());

        // --- Персонаж (с вращением по перетаскиванию) ---
        const characterGroup = new THREE.Group();
        characterGroup.position.set(0, 0, 0.2);

        function buildCharacter() {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xf7d6a8, roughness: 0.4 });
            const shirtMat = new THREE.MeshStandardMaterial({ color: 0x4a7db5, roughness: 0.5 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2a4a7a, roughness: 0.7 });
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.4), shirtMat);
            torso.position.y = 0.7; torso.castShadow = true; torso.userData.isCharacter = true;
            group.add(torso);
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.15, 8), skinMat);
            neck.position.y = 1.1; neck.castShadow = true; neck.userData.isCharacter = true;
            group.add(neck);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), skinMat);
            head.position.y = 1.3; head.castShadow = true; head.userData.isCharacter = true;
            group.add(head);
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eyeMat);
            eyeL.position.set(-0.12, 1.35, 0.22); eyeL.userData.isCharacter = true;
            group.add(eyeL);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eyeMat);
            eyeR.position.set(0.12, 1.35, 0.22); eyeR.userData.isCharacter = true;
            group.add(eyeR);

            const armMat = skinMat;
            const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5, 6), armMat);
            leftArm.position.set(-0.45, 0.8, 0); leftArm.rotation.z = 0.3; leftArm.castShadow = true; leftArm.userData.isCharacter = true;
            group.add(leftArm);
            const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5, 6), armMat);
            rightArm.position.set(0.45, 0.8, 0); rightArm.rotation.z = -0.3; rightArm.castShadow = true; rightArm.userData.isCharacter = true;
            group.add(rightArm);

            const legMat = pantsMat;
            const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), legMat);
            leftLeg.position.set(-0.2, 0.25, 0); leftLeg.castShadow = true; leftLeg.userData.isCharacter = true;
            group.add(leftLeg);
            const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6), legMat);
            rightLeg.position.set(0.2, 0.25, 0); rightLeg.castShadow = true; rightLeg.userData.isCharacter = true;
            group.add(rightLeg);

            return group;
        }
        characterGroup.add(buildCharacter());
        scene.add(characterGroup);

        // --- Мебель ---
        const furnitureItems = [];

        function addItem(mesh) {
            scene.add(mesh);
            furnitureItems.push(mesh);
            mesh.userData.name = mesh.userData.name || 'предмет';
            return mesh;
        }

        function createChair() {
            const group = new THREE.Group();
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x6a4a2a, roughness: 0.8 });
            const seatMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 });
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.06, 0.5), seatMat);
            seat.position.y = 0.35; seat.castShadow = true; seat.receiveShadow = true;
            group.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.04), woodMat);
            back.position.set(0, 0.6, -0.25); back.castShadow = true;
            group.add(back);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
            const legPos = [[-0.2, 0.15, -0.2], [0.2, 0.15, -0.2], [-0.2, 0.15, 0.2], [0.2, 0.15, 0.2]];
            legPos.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.3, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]); leg.castShadow = true;
                group.add(leg);
            });
            group.userData.name = 'Стул';
            return group;
        }

        function createTable() {
            const group = new THREE.Group();
            const tableMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.7 });
            const legMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.8 });
            const top = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.06, 0.6), tableMat);
            top.position.y = 0.6; top.castShadow = true; top.receiveShadow = true;
            group.add(top);
            const legPos = [[-0.35, 0.25, -0.25], [0.35, 0.25, -0.25], [-0.35, 0.25, 0.25], [0.35, 0.25, 0.25]];
            legPos.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8), legMat);
                leg.position.set(pos[0], pos[1], pos[2]); leg.castShadow = true;
                group.add(leg);
            });
            group.userData.name = 'Стол';
            return group;
        }

        function createTV() {
            const group = new THREE.Group();
            const screenMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.1, metalness: 0.8 });
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.5 });
            const standMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4 });
            const screen = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.04), screenMat);
            screen.position.set(0, 0.7, 0); screen.castShadow = true;
            group.add(screen);
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.55, 0.06), frameMat);
            frame.position.set(0, 0.7, 0); frame.castShadow = true;
            group.add(frame);
            const stand = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, 0.2), standMat);
            stand.position.set(0, 0.25, 0); stand.castShadow = true;
            group.add(stand);
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.25, 8), standMat);
            stem.position.set(0, 0.4, 0); stem.castShadow = true;
            group.add(stem);
            group.userData.name = 'Телевизор';
            return group;
        }

        const chair = createChair();
        chair.position.set(-1.0, 0, 1.2);
        addItem(chair);
        const table = createTable();
        table.position.set(1.2, 0, -0.8);
        addItem(table);
        const tv = createTV();
        tv.position.set(-1.5, 0, -1.5);
        tv.rotation.y = 0.4;
        addItem(tv);
        const chair2 = createChair();
        chair2.position.set(1.6, 0, 1.0);
        chair2.rotation.y = -0.5;
        addItem(chair2);

        // --- Управление: только зум (без панорамирования и вращения камеры) ---
        let zoomLevel = 4.5;
        const minZoom = 2.0;
        const maxZoom = 8.0;

        function updateZoom() {
            camera.position.z = zoomLevel;
            camera.lookAt(0, 1.2, 0);
        }

        // Зум колесиком
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoomLevel += e.deltaY * 0.005;
            zoomLevel = Math.min(maxZoom, Math.max(minZoom, zoomLevel));
            updateZoom();
        }, { passive: false });

        // Зум пинчем (два пальца)
        let lastTouchDist = 0;
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx*dx + dy*dy);
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const delta = (lastTouchDist - dist) * 0.02;
                zoomLevel += delta;
                zoomLevel = Math.min(maxZoom, Math.max(minZoom, zoomLevel));
                lastTouchDist = dist;
                updateZoom();
            }
        }, { passive: true });

        // --- Вращение персонажа по перетаскиванию (по клику/тапу на персонажа) ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let isDragging = false;
        let prevX = 0;
        let characterRotationY = 0;

        // Функция проверки попадания в персонажа
        function isHitCharacter(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            pointer.set(x, y);
            raycaster.setFromCamera(pointer, camera);
            const meshes = [];
            characterGroup.traverse(child => {
                if (child.isMesh) meshes.push(child);
            });
            const intersects = raycaster.intersectObjects(meshes, false);
            return intersects.length > 0;
        }

        // Начало перетаскивания (только если попали в персонажа)
        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            if (e.target.closest('#context-menu') || e.target.closest('#control-panel') || e.target.closest('#bottom-menu')) return;

            // Проверяем, попали ли в персонажа
            if (isHitCharacter(e)) {
                isDragging = true;
                prevX = e.clientX;
                // Отключаем зум (чтобы не мешал)
                renderer.domElement.style.touchAction = 'none';
            } else {
                // Если клик по предмету — выделим его (но только если не нажата кнопка управления)
                const hitItem = getIntersectedItem(e);
                if (hitItem) {
                    selectItem(hitItem);
                } else {
                    // Снимаем выделение
                    selectItem(null);
                }
            }
        }, { passive: true });

        // Перемещение пальца/мыши
        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - prevX;
            characterRotationY += deltaX * 0.005;
            characterGroup.rotation.y = characterRotationY;
            prevX = e.clientX;
        }, { passive: true });

        // Отпускание
        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false;
                renderer.domElement.style.touchAction = 'auto';
            }
        }, { passive: true });

        // --- Логика выделения предметов (для контекстного меню) ---
        function getIntersectedItem(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            pointer.set(x, y);
            raycaster.setFromCamera(pointer, camera);
            const meshes = [];
            furnitureItems.forEach(group => {
                group.traverse(child => {
                    if (child.isMesh) meshes.push(child);
                });
            });
            const intersects = raycaster.intersectObjects(meshes, false);
            if (intersects.length > 0) {
                let parent = intersects[0].object;
                while (parent.parent && !furnitureItems.includes(parent)) {
                    parent = parent.parent;
                }
                if (furnitureItems.includes(parent)) return parent;
            }
            return null;
        }

        // --- UI логика ---
        let selectedItem = null;
        let controlMode = 'move';

        const contextMenu = document.getElementById('context-menu');
        const controlPanel = document.getElementById('control-panel');
        const controlTitle = document.getElementById('control-title');
        const toast = document.getElementById('toast');

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function selectItem(item) {
            // Снимаем подсветку
            if (selectedItem) {
                selectedItem.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissive && child.material.emissive.setHex(0x000000);
                        child.material.emissiveIntensity = 0;
                    }
                });
            }
            selectedItem = item;
            if (item) {
                item.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissive = new THREE.Color(0x44aaff);
                        child.material.emissiveIntensity = 0.15;
                    }
                });
                showToast(`Выделен: ${item.userData.name}`);
                contextMenu.style.display = 'flex';
                controlPanel.style.display = 'none';
            } else {
                contextMenu.style.display = 'none';
                controlPanel.style.display = 'none';
            }
        }

        // --- Контекстное меню ---
        document.querySelectorAll('#context-menu .menu-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!selectedItem) return;
                const action = btn.dataset.action;
                if (action === 'move') {
                    controlMode = 'move';
                    controlTitle.textContent = 'Перемещение';
                    controlPanel.style.display = 'flex';
                    contextMenu.style.display = 'none';
                    showToast('Режим: перемещение');
                } else if (action === 'rotate') {
                    controlMode = 'rotate';
                    controlTitle.textContent = 'Вращение';
                    controlPanel.style.display = 'flex';
                    contextMenu.style.display = 'none';
                    showToast('Режим: вращение');
                } else if (action === 'delete') {
                    scene.remove(selectedItem);
                    const index = furnitureItems.indexOf(selectedItem);
                    if (index > -1) furnitureItems.splice(index, 1);
                    selectItem(null);
                    controlPanel.style.display = 'none';
                    showToast('Предмет удалён');
                }
            });
        });

        // --- Кнопки управления ---
        document.querySelectorAll('.arrow-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!selectedItem) return;
                const dir = btn.dataset.dir;
                const step = 0.08;
                const rotStep = 0.15;
                if (controlMode === 'move') {
                    let dx = 0, dz = 0;
                    if (dir === 'up') dz = step;
                    else if (dir === 'down') dz = -step;
                    else if (dir === 'left') dx = -step;
                    else if (dir === 'right') dx = step;
                    const halfX = roomWidth/2 - 0.3;
                    const halfZ = roomDepth/2 - 0.3;
                    const newX = Math.max(-halfX, Math.min(halfX, selectedItem.position.x + dx));
                    const newZ = Math.max(-halfZ, Math.min(halfZ, selectedItem.position.z + dz));
                    selectedItem.position.x = newX;
                    selectedItem.position.z = newZ;
                } else if (controlMode === 'rotate') {
                    if (dir === 'rot-left') selectedItem.rotation.y -= rotStep;
                    else if (dir === 'rot-right') selectedItem.rotation.y += rotStep;
                }
            });
        });

        document.getElementById('close-controls').addEventListener('click', () => {
            controlPanel.style.display = 'none';
            selectItem(selectedItem);
        });

        // --- Рейд (эмуляция GPS) ---
        const raidBtn = document.getElementById('raid-start-btn');
        const raidStatus = document.getElementById('raid-status');
        const raidResult = document.getElementById('raid-result');

        raidBtn.addEventListener('click', () => {
            raidBtn.disabled = true;
            raidStatus.textContent = '⏳ Поиск зоны...';
            raidResult.textContent = '';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lon = pos.coords.longitude.toFixed(6);
                        raidStatus.textContent = `📍 Ваши координаты: ${lat}, ${lon}`;
                        const zoneLat = lat + (Math.random() - 0.5) * 0.02;
                        const zoneLon = lon + (Math.random() - 0.5) * 0.02;
                        raidResult.innerHTML = `🎯 Зона: ${zoneLat}, ${zoneLon}<br>🔎 Идёт поиск предмета...`;
                        setTimeout(() => {
                            const items = ['🧥 Куртка', '🧢 Панамка', '📺 Телевизор', '🪑 Стул', '💡 Лампа'];
                            const found = items[Math.floor(Math.random() * items.length)];
                            raidResult.innerHTML = `✅ Вы нашли: ${found}!`;
                            raidStatus.textContent = '🎉 Рейд завершён!';
                            raidBtn.disabled = false;
                        }, 2000);
                    },
                    (err) => {
                        raidStatus.textContent = '❌ Ошибка GPS: ' + err.message;
                        raidBtn.disabled = false;
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                raidStatus.textContent = '❌ Геолокация не поддерживается';
                raidBtn.disabled = false;
            }
        });

        // --- Меню (переключение панелей) ---
        const overlays = {
            raid: document.getElementById('raid-overlay'),
            inventory: document.getElementById('inventory-overlay'),
            market: document.getElementById('market-overlay'),
            profile: document.getElementById('profile-overlay'),
        };

        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (tab === 'room') {
                    Object.values(overlays).forEach(o => o.classList.remove('active'));
                } else {
                    Object.values(overlays).forEach(o => o.classList.remove('active'));
                    if (overlays[tab]) overlays[tab].classList.add('active');
                }
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.querySelectorAll('[data-close]').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.dataset.close;
                overlays[name].classList.remove('active');
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.menu-btn[data-tab="room"]').classList.add('active');
            });
        });

        // --- Адаптация размера ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        console.log('Финальная игра загружена. Вращай персонажа перетаскиванием по нему.');
    </script>
</body>
</html>
