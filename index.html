<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройка причёски</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1a1a2e; font-family: -apple-system, sans-serif; overflow: hidden; color: #fff; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #ui-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 16px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 280px;
            max-width: 92%;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        #ui-panel .title {
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 6px;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }
        .row label { width: 36px; flex-shrink: 0; font-weight: 400; }
        .row input[type="range"] {
            flex: 1;
            background: #2a2a3a;
            height: 4px;
            border-radius: 2px;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        .row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #6cf;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(100,200,255,0.3);
        }
        .row .val {
            width: 40px;
            text-align: right;
            font-size: 12px;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 6px;
        }
        .btn-group button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-group button:active { transform: scale(0.95); background: rgba(100,200,255,0.2); }
        .btn-group button.reset { background: rgba(255,70,70,0.15); border-color: rgba(255,70,70,0.2); color: #ff6b6b; }
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            font-family: sans-serif;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 20px;
        }
        @media (max-width: 500px) {
            #ui-panel { min-width: unset; width: 94%; padding: 12px 14px; }
            .row label { width: 30px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="status">⏳ Загрузка моделей...</div>

    <!-- Панель управления -->
    <div id="ui-panel" style="display:none;">
        <div class="title" id="item-name">🎨 Настройка причёски</div>
        <div class="row"><label>X</label><input type="range" id="px" min="-1.0" max="1.0" step="0.001" value="0"><span class="val" id="px-val">0.000</span></div>
        <div class="row"><label>Y</label><input type="range" id="py" min="-1.0" max="1.0" step="0.001" value="0"><span class="val" id="py-val">0.000</span></div>
        <div class="row"><label>Z</label><input type="range" id="pz" min="-1.0" max="1.0" step="0.001" value="0"><span class="val" id="pz-val">0.000</span></div>
        <div class="row"><label>RX</label><input type="range" id="rx" min="-3.14" max="3.14" step="0.01" value="0"><span class="val" id="rx-val">0.00</span></div>
        <div class="row"><label>RY</label><input type="range" id="ry" min="-3.14" max="3.14" step="0.01" value="0"><span class="val" id="ry-val">0.00</span></div>
        <div class="row"><label>RZ</label><input type="range" id="rz" min="-3.14" max="3.14" step="0.01" value="0"><span class="val" id="rz-val">0.00</span></div>
        <div class="row"><label>Scale</label><input type="range" id="sc" min="0.1" max="3.0" step="0.01" value="1.0"><span class="val" id="sc-val">1.00</span></div>
        <div class="btn-group">
            <button class="reset" id="reset-btn">⟲ Сбросить</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // ⚠️ ИЗМЕНИ ПУТИ К СВОИМ МОДЕЛЯМ
        // ============================================================
        const CHARACTER_PATH = 'womenmodel.glb';  // ← твой персонаж
        const HAIR_PATH = 'hair1.glb';          // ← твоя причёска

        // ============================================================
        // СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // ============================================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.8, 4.5);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // ============================================================
        // УПРАВЛЕНИЕ КАМЕРОЙ
        // ============================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 1;
        controls.maxDistance = 8;
        controls.update();

        // ============================================================
        // СВЕТ
        // ============================================================
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(3, 5, 4);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
        fill.position.set(-2, 1, 5);
        scene.add(fill);

        // ============================================================
        // ЗАГРУЗКА МОДЕЛЕЙ
        // ============================================================
        const loader = new GLTFLoader();
        let characterModel = null;
        let hairModel = null;
        let hairGroup = new THREE.Group(); // группа для причёски (чтобы менять параметры)
        let headSlot = null;

        // Группа персонажа
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);

        // Статус
        const statusEl = document.getElementById('status');
        const uiPanel = document.getElementById('ui-panel');

        // Загрузка персонажа
        loader.load(CHARACTER_PATH, (gltf) => {
            characterModel = gltf.scene;
            characterModel.scale.set(1, 1, 1);
            characterGroup.add(characterModel);
            console.log('✅ Персонаж загружен');

            // Ищем слот головы
            characterModel.traverse((child) => {
                if (child.isObject3D && (child.name === 'head' || child.name === 'Head' || child.name === 'head_slot')) {
                    headSlot = child;
                }
            });

            // Если причёска уже загружена — крепим
            if (hairModel) attachHair();
            checkReady();
        }, undefined, (err) => {
            console.error('❌ Ошибка загрузки персонажа:', err);
            statusEl.textContent = '❌ Ошибка загрузки персонажа';
            statusEl.style.color = '#ff6b6b';
        });

        // Загрузка причёски
        loader.load(HAIR_PATH, (gltf) => {
            hairModel = gltf.scene;
            // Можно подогнать масштаб причёски, если она слишком большая/маленькая
            // hairModel.scale.set(0.8, 0.8, 0.8);
            hairGroup.add(hairModel);
            console.log('✅ Причёска загружена');

            if (characterModel) attachHair();
            checkReady();
        }, undefined, (err) => {
            console.error('❌ Ошибка загрузки причёски:', err);
            statusEl.textContent = '❌ Ошибка загрузки причёски';
            statusEl.style.color = '#ff6b6b';
        });

        function attachHair() {
            if (!characterModel || !hairModel) return;

            if (headSlot) {
                headSlot.add(hairGroup);
                console.log('✅ Причёска прикреплена к слоту головы');
            } else {
                // Если слота нет — крепим к центру персонажа со смещением
                hairGroup.position.set(0, 1.8, 0);
                characterModel.add(hairGroup);
                console.log('⚠️ Слот головы не найден, смещение Y=1.8');
            }

            // Применяем начальные настройки
            applySettings();
        }

        function checkReady() {
            if (characterModel && hairModel) {
                statusEl.textContent = '✅ Модели загружены, настройка активна';
                statusEl.style.color = '#6cf';
                uiPanel.style.display = 'flex';
            }
        }

        // ============================================================
        // ПАНЕЛЬ НАСТРОЕК
        // ============================================================
        const sliders = {
            px: document.getElementById('px'),
            py: document.getElementById('py'),
            pz: document.getElementById('pz'),
            rx: document.getElementById('rx'),
            ry: document.getElementById('ry'),
            rz: document.getElementById('rz'),
            sc: document.getElementById('sc'),
        };
        const vals = {
            px: document.getElementById('px-val'),
            py: document.getElementById('py-val'),
            pz: document.getElementById('pz-val'),
            rx: document.getElementById('rx-val'),
            ry: document.getElementById('ry-val'),
            rz: document.getElementById('rz-val'),
            sc: document.getElementById('sc-val'),
        };

        function applySettings() {
            if (!hairGroup) return;
            hairGroup.position.set(
                parseFloat(sliders.px.value),
                parseFloat(sliders.py.value),
                parseFloat(sliders.pz.value)
            );
            hairGroup.rotation.set(
                parseFloat(sliders.rx.value),
                parseFloat(sliders.ry.value),
                parseFloat(sliders.rz.value)
            );
            const s = parseFloat(sliders.sc.value);
            hairGroup.scale.set(s, s, s);
        }

        function updateLabels() {
            for (const key in sliders) {
                vals[key].textContent = sliders[key].value;
            }
        }

        function resetSliders() {
            sliders.px.value = '0';
            sliders.py.value = '0';
            sliders.pz.value = '0';
            sliders.rx.value = '0';
            sliders.ry.value = '0';
            sliders.rz.value = '0';
            sliders.sc.value = '1.0';
            updateLabels();
            applySettings();
        }

        // Подписка на слайдеры
        Object.values(sliders).forEach(el => {
            el.addEventListener('input', () => {
                updateLabels();
                applySettings();
            });
        });

        document.getElementById('reset-btn').addEventListener('click', resetSliders);

        // ============================================================
        // АДАПТАЦИЯ И АНИМАЦИЯ
        // ============================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Если через 10 секунд модели не загружены — показать ошибку
        setTimeout(() => {
            if (!characterModel || !hairModel) {
                statusEl.textContent = '⚠️ Модели не загружены. Проверь пути.';
                statusEl.style.color = '#ffaa00';
            }
        }, 10000);

        console.log('🚀 Код загружен. Ожидание моделей...');
    </script>
</body>
</html>
